  h2 { font-size: 16px; font-weight: 600; color: #2c2c2a; margin: 0 0 4px; }
  .subtitle { font-size: 12px; color: #888780; margin-bottom: 20px; }
  svg { display: block; width: 100%; max-width: 860px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); padding: 16px; box-sizing: border-box; }

  /* node color classes */
  .c-purple rect, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #3C3489; }
  .c-amber rect { fill: #FAEEDA; stroke: #BA7517; }
  .c-amber text { fill: #633806; }
  .c-gray rect { fill: #F1EFE8; stroke: #888780; }
  .c-gray text { fill: #444441; }

  .c-teal text { fill: #085041; }
  .c-red-exit rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red-exit text { fill: #501313; }

  .t { font-size: 13px; font-weight: 600; }
  .ts { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
  .th { font-size: 13px; font-weight: 600; }

  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  line.arr, path.arr { stroke: #888780; fill: none; }

  .badge { font-size: 11px; font-weight: 700; fill: #BA7517; }
  .legend-label { font-size: 11px; fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    body { background: #1e1e1c; }
    svg { background: #2c2c2a; }
    .c-purple rect { fill: #26215C; stroke: #AFA9EC; }
    .c-purple text { fill: #CECBF6; }
    .c-amber rect { fill: #412402; stroke: #EF9F27; }
    .c-amber text { fill: #FAC775; }
    .c-gray rect { fill: #2C2C2A; stroke: #5F5E5A; }
    .c-gray text { fill: #D3D1C7; }
    .c-teal rect { fill: #04342C; stroke: #5DCAA5; }

    .arr { stroke: #5F5E5A; }
    .ts { fill: #888780; }
    .th { fill: #D3D1C7; }
    .legend-label { fill: #888780; }
    h2 { color: #D3D1C7; }
    .subtitle { color: #5F5E5A; }
  }
